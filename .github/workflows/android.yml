name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Setup JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Accept licenses
      run: yes | sdkmanager --licenses || true

    - name: Create project files
      run: |
        mkdir -p app/src/main/java/com/schoolsms/app
        mkdir -p app/src/main/res/values

        # AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.schoolsms.app">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
            <application
                android:label="ကျောင်း SMS"
                android:hardwareAccelerated="true"
                android:theme="@android:style/Theme.Material.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true"
                    android:configChanges="orientation|screenSize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">ကျောင်း SMS</string>
        </resources>
        EOF

        # MainActivity.java
        cat > app/src/main/java/com/schoolsms/app/MainActivity.java << 'EOF'
        package com.schoolsms.app;
        import android.annotation.SuppressLint;
        import android.app.Activity;
        import android.content.Intent;
        import android.net.Uri;
        import android.os.Bundle;
        import android.view.KeyEvent;
        import android.view.View;
        import android.view.Window;
        import android.view.WindowManager;
        import android.webkit.CookieManager;
        import android.webkit.ValueCallback;
        import android.webkit.WebChromeClient;
        import android.webkit.WebResourceRequest;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.FrameLayout;
        import android.widget.ProgressBar;
        import android.graphics.Color;
        public class MainActivity extends Activity {
            private WebView webView;
            private ProgressBar progressBar;
            private ValueCallback<Uri[]> filePathCallback;
            private static final String URL = "https://script.google.com/macros/s/AKfycbzfZENGzuFlqfq3_RDpwRESZMpWn_TshFlGu6I3AX6S3CbRlXbjmgqgJsiz5lrOTDxePA/exec";
            @SuppressLint("SetJavaScriptEnabled")
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                requestWindowFeature(Window.FEATURE_NO_TITLE);
                getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                FrameLayout root = new FrameLayout(this);
                root.setBackgroundColor(Color.parseColor("#1e3a8a"));
                webView = new WebView(this);
                root.addView(webView, new FrameLayout.LayoutParams(-1,-1));
                progressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                progressBar.setMax(100);
                root.addView(progressBar, new FrameLayout.LayoutParams(-1, 8));
                setContentView(root);
                WebSettings ws = webView.getSettings();
                ws.setJavaScriptEnabled(true);
                ws.setDomStorageEnabled(true);
                ws.setLoadWithOverviewMode(true);
                ws.setUseWideViewPort(true);
                ws.setBuiltInZoomControls(false);
                ws.setCacheMode(WebSettings.LOAD_DEFAULT);
                ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                CookieManager.getInstance().setAcceptCookie(true);
                CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                webView.setWebViewClient(new WebViewClient() {
                    @Override public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest r) {
                        String url = r.getUrl().toString();
                        if (url.contains("google.com")) { v.loadUrl(url); return true; }
                        startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url))); return true;
                    }
                    @Override public void onPageFinished(WebView v, String u) { super.onPageFinished(v,u); progressBar.setVisibility(View.GONE); }
                });
                webView.setWebChromeClient(new WebChromeClient() {
                    @Override public void onProgressChanged(WebView v, int p) { progressBar.setVisibility(p<100?View.VISIBLE:View.GONE); progressBar.setProgress(p); }
                    @Override public boolean onShowFileChooser(WebView wv, ValueCallback<Uri[]> cb, FileChooserParams fp) {
                        filePathCallback = cb;
                        Intent i = new Intent(Intent.ACTION_GET_CONTENT); i.addCategory(Intent.CATEGORY_OPENABLE); i.setType("image/*");
                        startActivityForResult(Intent.createChooser(i,"ဓာတ်ပုံ"),100); return true;
                    }
                });
                webView.loadUrl(URL);
            }
            @Override public boolean onKeyDown(int k, KeyEvent e) {
                if (k==KeyEvent.KEYCODE_BACK && webView.canGoBack()) { webView.goBack(); return true; }
                return super.onKeyDown(k,e);
            }
            @Override protected void onActivityResult(int req, int res, Intent data) {
                if (req==100 && filePathCallback!=null) { filePathCallback.onReceiveValue(res==Activity.RESULT_OK&&data!=null?new Uri[]{data.getData()}:null); filePathCallback=null; }
                super.onActivityResult(req,res,data);
            }
            @Override protected void onDestroy() { webView.destroy(); super.onDestroy(); }
        }
        EOF

        # app/build.gradle
        cat > app/build.gradle << 'EOF'
        plugins { id 'com.android.application' }
        android {
            namespace 'com.schoolsms.app'
            compileSdk 34
            defaultConfig {
                applicationId "com.schoolsms.app"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 }
        }
        EOF

        # root build.gradle
        cat > build.gradle << 'EOF'
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        echo "rootProject.name = 'SchoolSMS'" > settings.gradle
        echo "include ':app'" >> settings.gradle
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    - name: Setup Gradle wrapper
      run: |
        curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradlew -o gradlew
        chmod +x gradlew
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: SchoolSMS-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
